# Pre-commit hooks — run automatically before every git commit
# Install once: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # Built-in checks (fast, no external deps)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: debug-statements          # catches leftover print(), breakpoint()

  # Ruff — lint + format in one pass
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff                       # lint (and auto-fix safe issues)
        args: [--fix]
      - id: ruff-format               # format (like black, but faster)
