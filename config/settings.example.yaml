# ---------------------------------------------------------------------------
# User Preferences (override from onboarding)
# ---------------------------------------------------------------------------
defaults:
  verbosity: "balanced"            # minimal, balanced, detailed
  tone: "casual"                   # warm, casual, professional
  proactivity: "moderate"          # low, moderate, high
  autonomy: "moderate"             # supervised, moderate, high
  notification_mode: "batched"     # minimal, batched, frequent
  quiet_hours:
    - start: "22:00"
      end: "07:00"
      days: ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"]
