# ===========================================================================
# Life OS — Configuration
# Copy this to settings.yaml and fill in your credentials
# ===========================================================================

# Storage
data_dir: "./data"

# User timezone (IANA format) — used for quiet hours, digests, and insights
timezone: "America/Los_Angeles"

# NATS event bus
nats_url: "nats://localhost:4222"

# Web server
web_host: "0.0.0.0"
web_port: 8080

# CORS (Cross-Origin Resource Sharing) security
# Controls which domains can make requests to your Life OS API.
# For production, lock down to specific origins only.
cors:
  # Allowed origins (exact match required)
  # Examples:
  #   - "http://localhost:3000"           # Local dev frontend
  #   - "https://myapp.example.com"       # Production frontend
  # Special values:
  #   - "*" allows all origins (INSECURE — dev only!)
  allowed_origins:
    - "http://localhost:8080"             # Web UI served by Life OS
    - "http://localhost:3000"             # Common dev port for frontends
    - "http://127.0.0.1:8080"
    - "http://127.0.0.1:3000"

# Embedding model (for vector search)
# Options: "all-MiniLM-L6-v2" (fast, 384 dims) or "nomic-embed-text" (via Ollama)
embedding_model: "all-MiniLM-L6-v2"

# ---------------------------------------------------------------------------
# AI Engine
# ---------------------------------------------------------------------------
ai:
  # Local model via Ollama (handles 90% of tasks privately)
  ollama_url: "http://localhost:11434"
  ollama_model: "mistral"          # Good balance of speed and quality
  # ollama_model: "llama3:13b"     # Better quality, needs more RAM
  # ollama_model: "phi3:14b"       # Great for task extraction

  # Cloud model (optional — for complex reasoning with PII stripping)
  use_cloud: false
  cloud_api_key: ""                # Anthropic API key
  cloud_model: "claude-sonnet-4-5-20250514"

