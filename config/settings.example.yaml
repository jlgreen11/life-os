# ---------------------------------------------------------------------------
# Browser Automation Layer (Stealth Fallback)
# ---------------------------------------------------------------------------
# When APIs fail, get rate-limited, or don't exist, the browser layer
# scrapes your data through the same UI you'd use manually.
# Your browser, your hardware, your accounts.
browser:
  enabled: false                     # Set to true to enable
  headless: true                     # false = see the browser (debugging)
  data_dir: "./data/browser"
  human_speed_factor: 1.0            # 1.0 = normal human speed
  global_rate_limit: 2.0             # Min seconds between page loads
  max_concurrent_contexts: 3

  # Credentials from Proton Pass
  credential_source: "proton_pass"   # or "manual"
  proton_pass_export: "./data/credentials/proton_pass_export.json"
  manual_vault: "./data/credentials/manual_vault.json"

